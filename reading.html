<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Lab - IELTS Minimalist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        /* Trạng thái Tập trung đọc: Ẩn sidebar câu hỏi, mở rộng vùng text chiếm 100% chiều rộng */
        .focus-reading-mode .reading-sidebar {
            display: none !important;
        }
        .focus-reading-mode .reading-text-container {
            width: 100% !important;
            max-width: 100% !important;
            flex: 1 !important;
        }

        /* Trạng thái Tập trung trả lời: Ẩn vùng text, mở rộng sidebar câu hỏi chiếm 100% */
        .focus-quiz-mode .reading-text-container {
            display: none !important;
        }
        .focus-quiz-mode .reading-sidebar {
            width: 100% !important;
            max-width: 100% !important;
            flex: 1 !important;
        }

        /* Thao tác highlight trạng thái nút tích cực */
        .btn-toggle-active {
            background-color: #2D3748 !important;
            color: #FFF !important;
            border-color: #2D3748 !important;
        }

        /* Giao diện Popup Sổ tay ghi chú tạm thời */
        .scratchpad-popup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 320px;
            height: 380px;
            background: #FFFFFF;
            border: 2px solid #62C4DA;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            z-index: 9999;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .scratchpad-header {
            background: #62C4DA;
            color: #FFFFFF;
            padding: 10px 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .scratchpad-close {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }
        .scratchpad-body {
            flex: 1;
            padding: 10px;
            background: #FFFDF6;
        }
        .scratchpad-textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            background: transparent;
            font-size: 13.5px;
            line-height: 1.5;
            color: #2D3748;
            outline: none;
        }
    </style>
</head>
<body>

    <main class="main-content full-width">
        <div class="reading-header-nav">
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">🏠 Về Menu Chính</button>
            <h2>📖 Reading Lab Workspace</h2>
        </div>

        <div id="import-section" class="import-container">
            <h3>📥 Thêm Bài Đọc Mới</h3>
            
            <div class="upload-zone" id="drop-zone">
                <p>Kéo thả file <strong>.txt</strong> hoặc <strong>.pdf</strong> vào đây hoặc</p>
                <input type="file" id="file-uploader" accept=".txt,.pdf" hidden>
                <button class="btn btn-primary" onclick="document.getElementById('file-uploader').click()">Chọn File Từ Máy</button>
            </div>

            <div class="input-text-zone">
                <p style="margin-bottom: 8px; font-weight: 600;">Hoặc dán trực tiếp nội dung văn bản vào đây:</p>
                <textarea id="direct-text-input" placeholder="Dán nội dung bài đọc tại đây..."></textarea>
                <button class="btn btn-success" id="btn-submit-text" style="margin-top: 10px; width: 100%;">⚡ Xác Nhận Nạp Văn Bản</button>
            </div>

            <div class="library-container">
                <h3>📚 Thư Viện Bài Đọc Của Bạn (<span id="lib-count">0</span>)</h3>
                <div class="library-grid" id="library-injector"></div>
            </div>
        </div>

        <div id="reading-area" class="reading-workspace hidden">
            
            <div class="workspace-top-bar" style="flex-wrap: wrap; gap: 10px;">
                <button class="btn btn-secondary btn-sm" id="btn-close-article">📁 Về Thư Viện</button>
                
                <div class="focus-tools-group" style="display: flex; gap: 5px;">
                    <button class="btn btn-primary btn-sm" id="btn-toggle-reading">🔍 Tập trung đọc</button>
                    <button class="btn btn-primary btn-sm" id="btn-toggle-quiz">📝 Tập trung trả lời</button>
                    <button class="btn btn-warning btn-sm" id="btn-open-scratchpad">📒 Mở Note</button>
                </div>

                <div class="selection-tools">
                    <button class="btn btn-success btn-sm" id="btn-add-to-notebook">➕ Thêm từ bôi đen vào sổ tay</button>
                    <div class="translation-live-bar">
                        <span>🌐 Bản dịch nhanh:</span>
                        <strong id="live-translated-text">Bôi đen từ hoặc đoạn văn để dịch tại đây...</strong>
                    </div>
                </div>

                <div id="reading-timer" style="font-family: monospace; font-size: 16px; font-weight: bold; color: #C93638; background: #FFF5F5; padding: 6px 12px; border-radius: 8px; border: 1px solid #FFDE96; min-width: 70px; text-align: center;">
                    20:00
                </div>

                <button class="btn btn-danger btn-sm" id="btn-submit-quiz">🚀 Nộp Bài Chấm Điểm</button>
            </div>

            <div class="workspace-title-section" style="margin-top: 10px; margin-bottom: 5px;">
                <h3 id="active-article-title" style="color: #C93638; margin: 0; font-size: 22px;">Tên bài viết</h3>
            </div>

            <div class="reading-layout-container" id="workspace-layout-wrapper">
                <aside class="reading-sidebar">
                    <div class="sticky-box" id="quiz-sidebar-container"></div>
                </aside>

                <article class="reading-text-container" id="text-render-area"></article>
            </div>

        </div> 
    </main>

    <div id="temporary-scratchpad" class="scratchpad-popup hidden">
        <div class="scratchpad-header">
            <span>📝 Ghi chú tạm thời (Sẽ mất khi thoát)</span>
            <button class="scratchpad-close" id="btn-close-scratchpad">×</button>
        </div>
        <div class="scratchpad-body">
            <textarea class="scratchpad-textarea" placeholder="Ghi chú nhanh thông tin, từ khóa bài đọc tại đây..."></textarea>
        </div>
    </div>

    <script src="reading.js"></script>
    <script src="reading-workspace.js"></script>

    <template id="ai-popup-template">
        <div id="ai-generator-popup" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; z-index: 9999;">
            <div style="background: white; padding: 30px; border-radius: 20px; border: 3px solid #FFDE96; max-width: 550px; width: 90%; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
                <h3 style="color: #C93638; margin-bottom: 12px;">⚠️ Chưa Có Bộ Câu Hỏi</h3>
                <p style="font-size: 14px; color: #4A5568; margin-bottom: 20px; line-height: 1.6;">
                    Bạn hiện chưa có bộ câu hỏi cho bài đọc này. Bạn có muốn sao chép mã hệ thống cấu trúc để nhờ AI tạo bộ câu hỏi riêng cho mình không?
                </p>
                <div style="display: flex; gap: 12px; justify-content: center;">
                    <button class="btn btn-primary" id="btn-popup-copy-prompt">📋 Copy Prompt Định Dạng Chuẩn</button>
                    <button class="btn btn-success" id="btn-popup-import-answer">📥 Dán Đáp Án Từ AI</button>
                    <button class="btn btn-secondary" id="btn-popup-close">Đóng</button>
                </div>
            </div>
        </div>
    </template>
</body>
</html>
