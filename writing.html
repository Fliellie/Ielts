<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Space - IELTS Minimalist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="main-content">
        <div class="writing-header-nav" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">🏠 Về Menu Chính</button>
            <h2>✍️ Writing Space Workspace</h2>
        </div>

        <header class="writing-welcome-banner">
            <h1>👋 Chào mừng bạn đến với không gian luyện viết!</h1>
            <p>
                Chúng tôi tôn trọng quyền sử dụng Ai của riêng bạn để chấm bài một cách thuyết phục nhất. Chúc bạn thành công.
            </p>
        </header>

        <section class="topics-section">
            <div class="task-zone">
                <h3 class="task-zone-title">📊 Luyện tập IELTS Writing Task 1</h3>
                <div class="writing-number-grid" id="task1-grid-container"></div>
            </div>

            <hr class="zone-divider"> <div class="task-zone">
                <h3 class="task-zone-title">📝 Luyện tập IELTS Writing Task 2</h3>
                <div class="writing-number-grid" id="task2-grid-container"></div>
            </div>
        </section>
    </main>

    <script src="writing-workspace.js"></script>
</body>
</html>
