<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm Tra Miệng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vocab.css">
    <style>
        /* Thiết lập background màu xanh mint nhạt đặc trưng */
        body {
            background-color: #a8ebd0 !important; 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container vẽ tay chính */
        .sketch-container {
            position: relative;
            max-width: 950px !important;
            width: 90%;
            height: 85vh; /* Khống chế chiều cao của khung để cuộn */
            background-color: #a8ebd0 !important;
            border: 3px double #C93638;
            box-shadow: none;
            padding: 0 !important; /* Reset padding để header sát viền */
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 8px;
        }

        /* THANH CỐ ĐỊNH Ở TRÊN CÙNG */
        .sticky-header {
            background-color: #fef08a; /* Màu vàng nhạt */
            border-bottom: 2px solid #C93638;
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 10;
            position: sticky;
            top: 0;
        }

        /* Vùng nội dung cuộn bên dưới header */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px 40px 30px;
            position: relative;
        }

        /* Custom thanh cuộn vẽ tay */
        .scrollable-content::-webkit-scrollbar {
            width: 12px;
        }
        .scrollable-content::-webkit-scrollbar-track {
            background: #a8ebd0;
            border-left: 2px solid #C93638;
        }
        .scrollable-content::-webkit-scrollbar-thumb {
            background: #90cdf4;
            border: 2px solid #C93638;
            border-radius: 6px;
        }

        /* Dòng hướng dẫn màu cam đất */
        .instruction-text {
            font-family: 'Patrick Hand', cursive, sans-serif;
            font-size: 1.6rem;
            color: #d97706;
            text-align: center;
            margin-bottom: 5px;
            line-height: 1.4;
            padding: 0 40px;
        }

        .note-text {
            font-family: 'Patrick Hand', cursive, sans-serif;
            font-size: 1.3rem;
            color: #d97706;
            text-align: center;
            margin-bottom: 25px;
            margin-top: 0;
            font-style: italic;
        }

        /* Layout danh sách dạng bảng dọc chứa các hàng từ vựng */
        .word-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 650px;
            margin: 0 auto;
        }

        /* Hàng hiển thị song song Đề bài và Đáp án */
        .word-row {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .word-index {
            font-family: 'Patrick Hand', cursive, sans-serif;
            font-size: 2.2rem;
            color: #2d3748;
            width: 30px;
            text-align: right;
        }

        /* Khung Đề bài (màu hồng pastel) */
        .word-card-question {
            flex: 1;
            background-color: #ffb3b3;
            border: 2px solid #C93638;
            border-radius: 12px;
            padding: 10px 15px;
            font-family: 'Patrick Hand', cursive, sans-serif;
            font-size: 1.5rem;
            color: #000000;
            text-align: center;
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.05);
        }

        /* Khung Đáp án (màu vàng pastel nhạt) */
        .word-card-answer {
            flex: 1;
            background-color: #fef08a; /* Màu vàng nhạt đồng màu header */
            border: 2px solid #C93638;
            border-radius: 12px;
            padding: 10px 15px;
            font-family: 'Patrick Hand', cursive, sans-serif;
            font-size: 1.5rem;
            color: #000000;
            text-align: center;
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.05);
            transition: background-color 0.2s;
        }

        /* Override nút btn sọc chéo màu xanh dương nhạt */
        .btn-quiz {
            background-color: #90cdf4 !important;
            max-width: 220px !important;
            font-size: 1.4rem;
            padding: 8px 0;
        }

        .empty-notify {
            font-family: 'Patrick Hand', cursive, sans-serif;
            font-size: 1.6rem;
            color: #718096;
            text-align: center;
            font-style: italic;
            margin-top: 30px;
        }

        /* Định vị nút back tròn góc trên bên trái */
        .btn-back {
            position: absolute !important;
            top: 15px;
            left: 20px;
            z-index: 11;
        }
    </style>
</head>
<body>

    <div class="sketch-container">
        <button class="btn-back" id="backBtn">←</button>

        <div class="sticky-header">
            <button class="btn btn-quiz" id="toggleModeBtn">trả lời tiếng anh</button>
            <button class="btn btn-quiz" id="shuffleBtn">xáo trộn</button>
        </div>

        <div class="scrollable-content">
            <p class="instruction-text" id="instruction">
                Kiểm tra miệng: hãy trả lời miệng với mode tiếng anh và viết ra giấy tiếng anh với mode tiếng việt nhé
            </p>
            <p class="note-text">lưu ý : nhấn dấu cách để biết đáp án</p>

            <div class="word-panel" id="wordListContainer">
                <div class="empty-notify">Đang tải danh sách từ hôm nay...</div>
            </div>
        </div>
    </div>

    <script src="mode2.js"></script>
</body>
</html>
