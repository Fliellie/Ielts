<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Từ Mới</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vocab.css">
    <style>
        /* Tự động mở rộng max-width của container để chứa vừa 2 cột Trái - Phải */
        .sketch-container {
            max-width: 850px !important;
        }

        /* Bố cục chia đôi Trái - Phải vẽ tay đồng bộ phong cách */
        .main-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            justify-content: space-between;
            width: 100%;
            margin-top: 20px;
        }
        
        .left-panel {
            flex: 1;
            text-align: center;
        }
        
        /* Bảng bên phải đồng bộ viền đỏ nét vẽ tay */
        .right-panel {
            flex: 1.2;
            background: #ffffff;
            border: 2px solid #C93638;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.05);
            max-height: 450px;
            overflow-y: auto;
        }
        
        .panel-title {
            font-family: 'Patrick Hand', 'Comic Sans MS', cursive, sans-serif;
            font-size: 1.8rem;
            color: #C93638;
            margin-top: 0;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 2px dashed #C93638;
            padding-bottom: 5px;
        }
        
        .vocab-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Patrick Hand', 'Comic Sans MS', cursive, sans-serif;
            font-size: 1.4rem;
            color: #000000;
        }
        
        .vocab-table th, .vocab-table td {
            border: 1px solid #C93638;
            padding: 10px 12px;
            text-align: left;
        }
        
        .vocab-table th {
            background-color: #FFDE96;
            color: #C93638;
        }
        
        .vocab-table tr:nth-child(even) {
            background-color: #fffaf0;
        }
        
        .text-center {
            text-align: center !important;
        }
        
        .empty-text {
            color: #a0aec0;
            font-style: italic;
            text-align: center;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="sketch-container">
        <button class="btn-back" id="backBtn">←</button>

        <div class="main-layout">
            <div class="left-panel">
                <h1 class="title" style="margin-bottom: 30px;">Ôn tập từ mới của bạn mỗi ngày !</h1>
                <div class="button-group">
                    <button class="btn" id="reviewBtn">ôn tập ngay</button>
                    <button class="btn" id="quizBtn">mode kiểm tra miệng</button>
                    <button class="btn" id="importBtn">thêm từ mới</button>
                    <button class="btn" id="libraryBtn">xem toàn bộ từ vựng của bạn</button>
                </div>
            </div>

            <div class="right-panel">
                <h2 class="panel-title">Từ cần ôn tập hôm nay</h2>
                <div id="table-container">
                    <table class="vocab-table">
                        <thead>
                            <tr>
                                <th class="text-center" style="width: 15%">STT</th>
                                <th style="width: 42.5%">Từ vựng (EN)</th>
                                <th style="width: 42.5%">Ý nghĩa (VI)</th>
                            </tr>
                        </thead>
                        <tbody id="vocab-list-body">
                            <tr>
                                <td colspan="3" class="empty-text">Đang tải dữ liệu...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="vocab.js"></script>
</body>
</html>
